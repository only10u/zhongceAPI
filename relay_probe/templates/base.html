<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" id="html-root">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}中测{% endblock %} — 中转站 API 检测平台</title>
  <link rel="stylesheet" href="/static/app.css"/>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="top">
    <div class="top-left">
      <a class="logo" href="/" data-i18n="brand">中测</a>
      <span class="sub" data-i18n="subtitle">中转站 API 检测平台</span>
    </div>
    <nav class="nav">
      <a href="/" data-i18n="nav_home">首页</a>
      <a href="/rank" data-i18n="nav_rank">中转站排行</a>
      <a href="/inclusion" data-i18n="nav_inclusion">中转站收录</a>
    </nav>
    <div class="top-right">
      <button type="button" class="btn-ghost" id="btn-theme" title="主题">🌓</button>
      <select id="lang" class="lang-sel" aria-label="语言">
        <option value="zh">中文</option>
        <option value="en">EN</option>
      </select>
      {% if user %}
        <a class="btn" href="/workspace" data-i18n="nav_workspace">工作台</a>
        {% if user.is_admin %}<a class="btn admin" href="/admin">Admin</a>{% endif %}
        <button type="button" class="btn-ghost" id="btn-logout" data-i18n="nav_logout">退出</button>
      {% else %}
        <a class="btn" href="/login" data-i18n="nav_login">登录</a>
      {% endif %}
    </div>
  </header>
  <main class="main">{% block main %}{% endblock %}</main>
  <footer class="foot">
    <span data-i18n="foot_copy">中测</span> ·
    <a href="/docs" target="_blank" rel="noopener">API</a> ·
    <a href="https://t.me/only10u" target="_blank" rel="noopener" data-i18n="foot_tg">Telegram: @only10u</a>
  </footer>
  <script src="/static/app.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
